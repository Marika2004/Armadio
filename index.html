<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Il mio Armadio</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Gestisce il popola tabella -->
	<script src="Funzioni.js" defer></script>

	<style>
		html, body {
			margin: 0;
			height: 100vh;
			width: 100%;
			overflow-x: hidden;
			background: linear-gradient(to top, #ddffdd 0%, #eeffee 100%);
			font-family: 'Roboto', sans-serif;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
		}

		.dynamic-text {
			font-size: clamp(10px, 1vw, 15px); /* Minimo 16px, preferito 5vw, massimo 40px */
		}

        .dynamic-btn {
            font-size: clamp(13px, 1vw, 15px);
            transition: filter 0.2s ease-in-out;
            border-radius: 16px;
        }
            .dynamic-btn:hover,
            .dynamic-btn:active {
                filter: brightness(87%);
                transition: transform 0.3s ease, filter 0.3s ease; /* Aggiunge una transizione fluida */
            }

		body {
			overflow-x: hidden;
		}

		/* colora il cuore di rosso */
        input:checked + .cuore {
            color: red;
        }

        .cuore {
            color: lightgray;
            cursor: pointer;
            transition: color 0.2s;
        }
	</style>
</head>

<body>
	<!-- BTN principali -->
	<header>
		<div class="row m-2">
			<div class="col-6">
				<button class="btn dynamic-btn btn-success p-2" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
					☰ Menu
				</button>
			</div>

			<div class="col-6 d-flex aling-item-center justify-content-end">
				<button id="btnCreaOutfit" class="btn dynamic-btn btn-success text-start" style="display:none">Crea outfit</button>
			</div>
		</div>
	</header>

	<main>
		<!-- Sidebar -->
		<div class="offcanvas offcanvas-start bg-dark" tabindex="-1" id="sidebar">
			<div class="offcanvas-header">
				<h5 class="offcanvas-title text-white">Menu</h5>
				<button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
			</div>

			<div class="offcanvas-body">
				<button id="btnMioArmadio" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas">📦 Mio armadio</button>
				<button id="btnVisualizzaOutfit" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas">📋 Outfit</button>
				<button id="btnAggiungiArticolo" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas">➕ Aggiungi articolo</button>
				<button id="btnNuovoOutfit" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas">👕 Nuovo outfit</button>
				<button id="btnExportJson" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas" onclick="exportJson()">📤 Export Json</button>
				<button id="btnImportJson" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas" onclick="exportJson()">📥 Import Json</button>
				<button id="btnEliminaDB" class="btn dynamic-btn btn-outline-light w-100 text-start p-2 mb-2" data-bs-dismiss="offcanvas" onclick="eliminaDB()">🗑️ Elimina DB</button>
			</div>

			<div class="dropdown">
				<a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
					<img src="https://github.com/mdo.png" alt="" width="32" height="32" class="rounded-circle me-2">
					<strong>mdo</strong>
				</a>
				<ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
					<li><a class="dropdown-item" href="#">Profile</a></li>
					<li><a class="dropdown-item" href="#">Sign out</a></li>
				</ul>
			</div>
		</div>

		<!-- TITLE -->
		<div class="d-flex flex-column aling-item-center justify-content-center m-4">			
			<h5 id="title" class="fw-bold"></h5>
			<input type="text" id="search" class="form-control" placeholder="🔍 Cerca articolo...">
			<span id="sottoTitolo" class="dynamic-text"></span>
		</div>

		<!-- NUOVO / DETAGLI Articolo -->
		<div id="DivDettagliArticolo" style="display:none">			
			<div class="row m-2">

				<div class="col-12 col-md-5">
					<div id="divNuovoArticolo" style="display: none">
						<span class="dynamic-text fw-bold" style="width: auto;">Foto</span>
						<input type="file" id="Foto" class="dynamic-text form-control">
						<button id="btnNuovoArticolo" class="btn dynamic-btn btn-success mt-2">Aggiungi</button>
					</div>
					<div id="divModificaArticolo" style="display: none">
						<img id="Immagine" class="rounded-2 " style="height:100px;">
						<div class="mt-2">
							<button id="btnModificaArticolo" class="btn dynamic-btn btn-success me-2">Modifica</button>
							<button id="btnSalvaModificheArticolo" class="btn dynamic-btn btn-success me-2">Salva modifica</button>
							<button id="btnEliminaArticolo" class="btn dynamic-btn btn-success">Elimina</button>
						</div>						
					</div>
				</div>

				<div class="col-12 col-md-7">
					<!-- Obbligatorio -->
					<div>
						<span class="dynamic-text fw-bold" style="width: auto;">Titolo</span>
						<input type="text" id="Titolo" class="dynamic-text form-control">
					</div>
										
					<div>
						<span class="dynamic-text fw-bold" style="width: auto;">Categoria</span>
						<select id="Categoria" class="form-select dynamic-text text-start">
							<option value="Top">Top</option>
							<option value="Bottom">Bottom</option>
							<option value="Scarpe">Scarpe</option>
							<option value="Outerwear">Outerwear</option>
							<option value="Accessori">Accessori</option>
						</select>
					</div>

					<div>
						<span class="dynamic-text fw-bold" style="width: auto;">Tipo</span>
						<select id="Tipo" class="form-select dynamic-text text-start">
							<!-- TOP -->
							<option value="T-shirt">T-shirt</option>
							<option value="Camicia">Camicia</option>
							<option value="Felpa">Felpa</option>
							<option value="Maglione">Maglione</option>
							<option value="Polo">Polo</option>

							<!-- BOTTOM -->
							<option value="Jeans">Jeans</option>
							<option value="Pantaloni">Pantaloni</option>
							<option value="Pantaloni eleganti">Pantaloni eleganti</option>
							<option value="Shorts">Shorts</option>
							<option value="Gonna">Gonna</option>

							<!-- SCARPE -->
							<option value="Sneakers">Sneakers</option>
							<option value="Stivali">Stivali</option>
							<option value="Scarpe eleganti">Scarpe eleganti</option>
							<option value="Sandali">Sandali</option>

							<!-- OUTERWEAR -->
							<option value="Giacca">Giacca</option>
							<option value="Cappotto">Cappotto</option>
							<option value="Giubbotto">Giubbotto</option>
						</select>
					</div>

					<div>
						<span class="dynamic-text fw-bold" style="width: auto;">Colore</span>
						<select id="Colore" class="form-select dynamic-text text-start">
							<option value="Nero">Nero</option>
							<option value="Bianco">Bianco</option>
							<option value="Grigio">Grigio</option>
							<option value="Beige">Beige</option>
							<option value="Marrone">Marrone</option>
							<option value="Blu">Blu</option>
							<option value="Azzurro">Azzurro</option>
							<option value="Verde">Verde</option>
							<option value="Rosso">Rosso</option>
							<option value="Bordeaux">Bordeaux</option>
							<option value="Giallo">Giallo</option>
							<option value="Arancione">Arancione</option>
							<option value="Rosa">Rosa</option>
							<option value="Viola">Viola</option>
							<option value="Multicolore">Multicolore</option>
						</select>
					</div>

					<div>
						<span class="dynamic-text fw-bold" style="width: auto;">Stagione</span>
						<select id="Stagione" class="form-select dynamic-text text-start">
							<option value="Estate">Estate</option>
							<option value="Inverno">Inverno</option>
							<option value="MezzaStagione">Mezza stagione</option>
						</select>
					</div>				
				</div>
			</div>
		</div>

		<!-- MOSTRO Outfit -->
		<div id="mieiOutfit" class="row d-flex aling-item-center justify-content-center m-2 p-2"></div>

		<!-- MOSTRO Articoli -->
		<div id="mieiArticoli" class="row d-flex aling-item-center justify-content-center m-2 p-2"></div>
</main>

	<script>
		let db;
        let idArticolo;
        let arrayId = [];

        //--------------------------------------------------------------------------------------- CREO DB & TABELLE
		//Creo DB
		const request = indexedDB.open("ArmadioDB", 2);

		//Creo Tabelle
		request.onupgradeneeded = function (e) {
			db = e.target.result;

            //Creo Tabella "vestiti"
            if (!db.objectStoreNames.contains("vestiti")) {
                db.createObjectStore("vestiti", { keyPath: "id", autoIncrement: true });
            }

            //Creo Tabella "outfit"
            if (!db.objectStoreNames.contains("outfit")) {
                db.createObjectStore("outfit", { keyPath: "id", autoIncrement: true });
            }
        };

		//Una volta creata la Tabella carico i DATI
		request.onsuccess = function (e) {
			db = e.target.result;

            //--------------------------------------------------------------------------------------- DATI INIZIALI
            mostraOutfit();
		};

        //--------------------------------------------------------------------------------------- BTN VISUALIZZA IL MIO ARMADIO
		document.getElementById("btnMioArmadio").addEventListener("click", function () {
            mostraArticoli();
		});        

        //--------------------------------------------------------------------------------------- BTN SALVA ARTICOLO NUOVO
        document.getElementById("btnNuovoArticolo").addEventListener("click", function () {
            salvaNuovoArticolo();
        });         

		//--------------------------------------------------------------------------------------- BTN AGGIUNGI ARTICOLO NUOVO
		document.getElementById("btnAggiungiArticolo").addEventListener("click", function () {
			aggiungiArticolo();
		});

        //--------------------------------------------------------------------------------------- BTN SELEZIONA N° ARTICOLI
        document.getElementById("btnNuovoOutfit").addEventListener("click", function () {
			mostraArticoliCliccabili();
        });
        
        //--------------------------------------------------------------------------------------- BTN CREA OUTFIT NUOVO
        document.getElementById("btnCreaOutfit").addEventListener("click", function () {
            creaOutfit(arrayId);
		});

        //--------------------------------------------------------------------------------------- BTN MODIFICO ARTICOLO
		document.getElementById("btnModificaArticolo").addEventListener("click", function () {
			modificaArticolo();
		});

        //--------------------------------------------------------------------------------------- BTN MODIFICO ARTICOLO
        document.getElementById("btnSalvaModificheArticolo").addEventListener("click", function () {
			salvaModificheArticolo();
        });
        

        //--------------------------------------------------------------------------------------- BTN ELIMINO ARTICOLO
		document.getElementById("btnEliminaArticolo").addEventListener("click", function () {
			eliminaArticolo();
		});

        //--------------------------------------------------------------------------------------- BTN VISUALIZZA OUTFIT
        document.getElementById("btnVisualizzaOutfit").addEventListener("click", function () {
            mostraOutfit();
        });


		/*
			EXTRA:
			-	Filtri: mostra solo maglie
			-	Outfit preferiti
			-	ridimensionare immagine prima di salvarla (es. max 300px)
			-	Elimina / Duplica / Modifica Outfit
			-	capi mai usati, outfit più usati
		*/


	</script>
</body>
</html>
