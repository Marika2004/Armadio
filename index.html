<!DOCTYPE html>

    <style>
        html, body {
            margin: 0;
            height: 100vh;
            width: 100%;
            overflow-x: hidden;
            background: linear-gradient(to top, #ddffdd 0%, #eeffee 100%);
            font-family: 'Roboto', sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /*
            Inizio Caricamento
        */
        /* Overlay a schermo intero */
        #pageOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: wait; /* cursore “rotella” */
        }

        /* Testo "Caricamento" con effetto pulsazione */
        .loading-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #fff;
            animation: textPulse 1.5s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* Indicatore di fase */
        .phase {
            display: flex;
            gap: 10px;
        }

            .phase div {
                width: 18px;
                height: 18px;
                background: linear-gradient(45deg, #006633, #00cc66, #009944);
                border-radius: 50%;
                animation: dotPulse 1.5s ease-in-out infinite;
            }

                .phase div:nth-child(2) {
                    animation-delay: 0.2s;
                }

                .phase div:nth-child(3) {
                    animation-delay: 0.4s;
                }

        @keyframes dotPulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }
        /*
            Fine Caricamento
        */

        .dynamic-text {
            font-size: clamp(10px, 1vw, 15px); /* Minimo 16px, preferito 5vw, massimo 40px */
        }

        .dynamic-btn {
            font-size: clamp(13px, 1vw, 15px);
            transition: filter 0.2s ease-in-out;
            border-radius: 16px;
        }

            .dynamic-btn:hover,
            .dynamic-btn:active {
                filter: brightness(87%);
                transition: transform 0.3s ease, filter 0.3s ease; /* Aggiunge una transizione fluida */
            }

        body {
            overflow-x: hidden;
        }

        /* colora il cuore di rosso */
        input:checked + .cuore {
            color: red;
        }

        .cuore {
            color: lightgray;
            cursor: pointer;
            transition: color 0.2s;
        }
    </style>
</head>
<body>
