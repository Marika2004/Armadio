<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Il mio Armadio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Gestisce il popola tabella -->
  <script src="Funzioni.js" defer></script>
  
  <style>
	  html, body {
		margin: 0;
		height: 100vh;
		width: 100%;
		overflow-x: hidden;
		background: linear-gradient(to top, #ddffdd 0%, #eeffee 100%);
		font-family: 'Roboto', sans-serif;
		text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
	}

	.dynamic-text {
		font-size: clamp(10px, 1vw, 15px); /* Minimo 16px, preferito 5vw, massimo 40px */
	}
	
	.btn {
		border-radius: 16px;
	}

	.dynamic-btn {
		font-size: clamp(13px, 1vw, 15px);
		transition: filter 0.2s ease-in-out;
		border-radius: 16px;
	}
		.dynamic-btn:hover,
		.dynamic-btn:active {
			filter: brightness(87%);
			transition: transform 0.3s ease, filter 0.3s ease; /* Aggiunge una transizione fluida */
		}
  </style>
  
</head>

<body>
	<h2>Il mio armadio</h2>
	
	<div class="m-2">
		<span class="dynamic-text fw-bold" style="width: auto;">Titolo</span>
		<input type="text" id="Titolo" class="dynamic-text">
	</div>
	<div class="m-2">
		<span class="dynamic-text fw-bold" style="width: auto;">Descrizione</span>
		<input type="text" id="Descrizione" class="dynamic-text">
	</div>
	<div class="m-2">
		<span class="dynamic-text fw-bold" style="width: auto;">Colore</span>
		<input type="text" id="Colore" class="dynamic-text">
	</div>
	<div class="m-2">
		<span class="dynamic-text fw-bold" style="width: auto;">Categoria</span>
		<input type="text" id="Categoria" class="dynamic-text">
	</div>
	<div class="m-2">
		<span class="dynamic-text fw-bold" style="width: auto;">Foto</span>		
		<input type="file" id="Foto" class="dynamic-text">
		<button class="btn dynamic-btn btn-primary" onclick="salva()">Salva</button>		
		<button class="btn dynamic-btn btn-primary" onclick="elimina()">Elimina</button>		
		<button class="btn dynamic-btn btn-primary" onclick="exportJson()">Export Json</button>		
	</div>	

	<div id="lista" class="row mb-5"></div>

	<script>
		let db;
		
		//Creo DB
		const request = indexedDB.open("ArmadioDB", 1);

		//Creo Tabella "vestiti"
		request.onupgradeneeded = function (e) {
		  db = e.target.result;
		  db.createObjectStore("vestiti", { keyPath: "id", autoIncrement: true});
		};

		//Una volta creata la Tabella carico i DATI
		request.onsuccess = function (e) {
		  db = e.target.result;
		  carica();
		};

		

		
	</script>

</body>
</html>
